name: iOS Smoke LLM (fork-test)

# Fork-only sibling of `smokeIOSLLM.yml`. Same LLM-driven test
# runner, but rewired to run on the user's personal fork without the
# upstream Blacksmith Mac / OS_BOTIFY_TOKEN / AWS credentials chain.
#
# DIFFERENCES FROM smokeIOSLLM.yml:
#   - runs-on: macos-latest (free GHA public-repo tier; ~50–60 min
#     wall-clock vs ~25–30 min on Blacksmith M4)
#   - submodules: false on checkout (no OS_BOTIFY_TOKEN, no
#     Mobile-Expensify access — standalone NewDot build doesn't need
#     it)
#   - No AWS credentials step. Rock is forced off via the xcodebuild
#     fallback path; we always do a local build.
#   - Hard-guarded to refuse to run on the upstream repo via an
#     `if:` on `github.repository`.
#
# DO NOT MERGE TO UPSTREAM.

on:
  workflow_dispatch:

concurrency:
  group: smoke-ios-llm-fork-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: iOS simulator smoke LLM (fork-test)
    if: ${{ github.repository == 'rustam-callstack/App' }}
    # Reverted from `blacksmith-12vcpu-macos-latest` back to `macos-latest`:
    # the fork doesn't have Blacksmith Mac access provisioned (run
    # 26029219342 sat indefinitely waiting for a runner). Upstream
    # smokeIOSLLM.yml still uses Blacksmith — Expensify's CI infra
    # will pick that up when the upstream PR runs.
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      # 0.14.8 (2026-05-11) and 0.14.9 (2026-05-13) shipped after our
      # initial 0.14.7 pin. 0.14.7's daemon hangs on `agent-device
      # snapshot` calls on free macos-latest (6/6 retries on run pool
      # produced `Error (COMMAND_FAILED): Daemon request timed out`).
      # Bumping to 0.14.9 to test whether the daemon bug was fixed
      # upstream. If this lands green, port the bump to Android too.
      AGENT_DEVICE_VERSION: "0.14.9"
      STANDALONE_NEW_DOT: "true"
      LLM_TOKEN_BUDGET: "200000"
      ANTHROPIC_MODEL: "claude-sonnet-4-6"
      PLATFORM: "ios"
      # Free GHA macos-latest's agent-device daemon can't return a
      # snapshot reliably (8/8 dedicated retries across 0.14.7 and
      # 0.14.9 hit `Error (COMMAND_FAILED): Daemon request timed
      # out`). Scope this fork-test workflow down to launch-only:
      # the driver does the full boot dance + `agent-device open`,
      # verifies the app is alive via `xcrun simctl spawn booted
      # launchctl list`, and exits before the LLM-driven snapshot
      # loop. Upstream `smokeIOSLLM.yml` does NOT set this — it
      # runs the full LLM-driven flow on Blacksmith Mac, where the
      # daemon works.
      IOS_SCOPE: "launch-only"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: false

      - name: Select Xcode
        # macos-latest ships multiple Xcodes; pick the newest available.
        # `xcode-select -p` reports the current default after selection.
        run: |
          XCODE=$(ls -1d /Applications/Xcode_*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcode-select -p

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode
        with:
          IS_HYBRID_BUILD: "false"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install agent-device CLI
        run: npm install -g "agent-device@${AGENT_DEVICE_VERSION}"

      - name: Configure MapBox SDK
        run: ./scripts/setup-mapbox-sdk.sh ${{ secrets.MAPBOX_SDK_DOWNLOAD_TOKEN }}

      - name: CocoaPods cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ios-fork-pods-${{ hashFiles('ios/Podfile.lock', 'ios/firebase.json') }}
          restore-keys: |
            ios-fork-pods-

      - name: DerivedData cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        with:
          path: ios/build
          key: ios-fork-deriveddata-${{ hashFiles('ios/Podfile.lock', 'ios/**/*.{m,mm,swift,h,c,cpp}') }}
          restore-keys: |
            ios-fork-deriveddata-

      - name: Pod install
        run: npm run pod-install

      - name: Build dev iOS simulator app (xcodebuild)
        # Fork has no AWS credentials so we skip Rock entirely and go
        # straight to xcodebuild. Active arch only to keep the build
        # narrow on free macos-latest.
        # Scheme: "New Expensify Dev" (with spaces) — standalone NewDot
        # dev scheme. Config: DebugDevelopment — matches the existing
        # Pods xcconfig pattern. `set -o pipefail` so xcodebuild errors
        # surface through the xcbeautify pipe.
        run: |
          set -eo pipefail
          xcodebuild \
            -workspace ios/NewExpensify.xcworkspace \
            -scheme "New Expensify Dev" \
            -configuration DebugDevelopment \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
          # Product name follows the scheme name, not the target name.
          # The "New Expensify Dev" scheme produces "New Expensify Dev.app"
          # (with spaces) under DebugDevelopment-iphonesimulator/.
          test -d "ios/build/Build/Products/DebugDevelopment-iphonesimulator/New Expensify Dev.app" \
            || { echo "::error::xcodebuild succeeded but New Expensify Dev.app missing from DerivedData"; ls ios/build/Build/Products/DebugDevelopment-iphonesimulator/ 2>/dev/null; exit 1; }

      - name: Boot iOS simulator
        run: |
          UDID=$(xcrun simctl list devices --json \
            | jq -r '[.devices[][] | select(.name | test("iPhone 1[567]"; "i"))] | .[0].udid')
          if [ -z "$UDID" ] || [ "$UDID" = "null" ]; then
            UDID=$(xcrun simctl create smoke-iphone com.apple.CoreSimulator.SimDeviceType.iPhone-15 \
              "$(xcrun simctl list runtimes --json | jq -r '[.runtimes[] | select(.platform == "iOS" and .isAvailable == true)] | .[-1].identifier')")
          fi
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "Booted $UDID"

      - name: Run smoke (LLM-driven)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run smoke:ios:llm -- tests/smoke/ios-signin.testcase.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: smoke-ios-llm-fork-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
