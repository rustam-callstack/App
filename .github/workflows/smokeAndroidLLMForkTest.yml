name: Android Smoke LLM (fork-test)

# Fork-only sibling of `smokeAndroidLLM.yml`. Same LLM-driven test
# runner, but rewired to run on the user's personal fork without the
# upstream Blacksmith / OS_BOTIFY_TOKEN / AWS credentials chain.
#
# DIFFERENCES FROM smokeAndroidLLM.yml:
#   - runs-on: ubuntu-latest (free for public repos; KVM-enabled since 2024)
#     instead of blacksmith-4vcpu-ubuntu-2404
#   - submodules: false on checkout (no OS_BOTIFY_TOKEN, no Mobile-Expensify
#     access). Standalone NewDot build doesn't need the submodule.
#   - No AWS-credentials step. Rock is forced to --local so it skips the
#     S3 cache lookup; we always do a local Gradle build (~15-20 min).
#   - Hard-guarded to refuse to run on the upstream repo via an `if:` on
#     `github.repository`.
#   - No continue-on-error; on the fork we want loud failures so we
#     iterate faster.
#
# DO NOT MERGE THIS FILE TO UPSTREAM.

on:
  workflow_dispatch:

concurrency:
  group: smoke-android-llm-fork-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Android emulator smoke LLM (fork-test)
    if: ${{ github.repository == 'rustam-callstack/App' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AGENT_DEVICE_VERSION: "0.14.7"
      STANDALONE_NEW_DOT: "true"
      LLM_TOKEN_BUDGET: "200000"
      ANTHROPIC_MODEL: "claude-sonnet-4-6"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: false

      - name: Verify KVM / fix permissions if needed
        run: |
          if ! ls -la /dev/kvm 2>/dev/null; then
            echo "::error::No /dev/kvm on this runner — emulator will fall back to TCG and the job will time out"
            exit 1
          fi
          if [ ! -w /dev/kvm ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
          fi

      - name: Free disk space (ubuntu-latest only)
        # Free ~25 GB by removing pre-installed tooling we don't use.
        # Run 25851889632 failed during react-native-reanimated CMake
        # compile with "No space left on device" — the runner ships
        # with ~14 GB free, and Gradle + Pods + DerivedData + the
        # AVD cache combined exceed that under load. Earlier fork-test
        # runs got lucky; this step makes the headroom predictable.
        # NOT applied to the upstream Blacksmith runner (it has more
        # disk and the wrong preinstalled set anyway).
        run: |
          df -h / | tail -1
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/heroku
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /opt/hostedtoolcache/go
          sudo apt-get -qy autoremove --purge
          sudo apt-get -qy clean
          docker rmi $(docker image ls -aq) 2>/dev/null || true
          df -h / | tail -1

      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode
        with:
          IS_HYBRID_BUILD: "false"

      - name: Install agent-device CLI
        run: npm install -g "agent-device@${AGENT_DEVICE_VERSION}"

      - name: Configure MapBox SDK
        run: ./scripts/setup-mapbox-sdk.sh ${{ secrets.MAPBOX_SDK_DOWNLOAD_TOKEN }}

      - name: Install Android CMake 3.30.5 (Hermes pins this exact version)
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "cmake;3.30.5" 2>&1 | tail -5
          ls "$ANDROID_HOME/cmake/3.30.5/bin/cmake"

      - name: Build developmentDebug APK locally (no S3 cache, x86_64 only)
        run: |
          npx rock build:android \
            --variant developmentDebug \
            --local \
            --active-arch-only \
            --extra-params="-PreactNativeArchitectures=x86_64"

      - name: Stop Gradle daemon (free ~1.5 GB before emulator)
        run: |
          cd android && ./gradlew --stop || true

      - name: AVD cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            ~/.android/adbkey
            ~/.android/adbkey.pub
          key: avd-pixel8-api35-x86_64-v1-${{ hashFiles('.github/workflows/smokeAndroidLLMForkTest.yml') }}

      - name: Prime AVD snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: |
            adb wait-for-device
            until [ -n "$(adb shell getprop sys.boot_completed | tr -d '\r')" ]; do sleep 2; done
            echo "AVD primed"

      - name: Run smoke (LLM-driven)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: npm run smoke:android:llm

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: smoke-android-llm-fork-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
